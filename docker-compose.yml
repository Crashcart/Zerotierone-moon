# This file is regenerated by install.sh with your .env values filled in.
# To use manually (after running install.sh at least once), run:
#   docker compose up -d

services:
  zerotier:
    image: zerotier-moon                       # built by install.sh
    container_name: zerotier-moon
    restart: always
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    networks:
      macvlan-lan1:
        ipv4_address: 192.168.1.253            # update or run install.sh
      macvlan-lan2:
        ipv4_address: 172.16.0.253             # update or run install.sh
    ports:
      - "9993:9993/udp"
    volumes:
      - /volume1/docker/zerotier/zerotier-one:/var/lib/zerotier-one
      - /volume1/docker/zerotier/iptables:/etc/iptables
      - /volume1/docker/zerotier/iproute2/rt_tables:/etc/iproute2/rt_tables
    environment:
      - NETWORK_IDS=<YOUR_ZT_NETWORK_ID>       # from my.zerotier.com
      - GENERATE_MOON=true
      - MOON_ENDPOINTS=192.168.1.253/9993,172.16.0.253/9993

networks:
  macvlan-lan1:
    external: true    # created by install.sh
  macvlan-lan2:
    external: true    # created by install.sh
