# This file is regenerated by install.sh with your .env values filled in.
# To use manually (after running install.sh at least once), run:
#   docker compose up -d

services:
  zerotier:
    image: zerotier-moon                       # built by install.sh
    container_name: zerotier-moon
    restart: always
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW      # required for iptables raw table (NOTRACK) — prevents TCP cutouts
      - SYS_ADMIN
    networks:
      macvlan-lan1:
        ipv4_address: 192.168.1.253            # update or run install.sh
      macvlan-lan2:
        ipv4_address: 172.16.0.253             # update or run install.sh
    # NOTE: 'ports' has no effect under macvlan networking — Docker does not
    # create DNAT rules for macvlan containers. Forward UDP 9993 on the
    # upstream router directly to the container's macvlan IP instead.
    sysctls:
      net.core.rmem_max: 8388608               # 8 MB — ~2× BDP for ZT on 1GbE/J3455
      net.core.wmem_max: 8388608               # 8 MB send buffer
      net.core.netdev_max_backlog: 5000        # larger packet queue before drops
      net.ipv4.udp_rmem_min: 8192
      net.ipv4.udp_wmem_min: 8192
    healthcheck:
      test: ["CMD", "zerotier-cli", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - /volume1/docker/zerotier/zerotier-one:/var/lib/zerotier-one
      - /volume1/docker/zerotier/iptables:/etc/iptables
      - /volume1/docker/zerotier/iproute2/rt_tables:/etc/iproute2/rt_tables
      - /volume1/docker/zerotier/local.conf:/var/lib/zerotier-one/local.conf:ro
    environment:
      - NETWORK_IDS=<YOUR_ZT_NETWORK_ID>       # from my.zerotier.com
      - GENERATE_MOON=true
      - MOON_ENDPOINTS=192.168.1.253/9993,172.16.0.253/9993

networks:
  macvlan-lan1:
    external: true    # created by install.sh
  macvlan-lan2:
    external: true    # created by install.sh
