name: Lint

on:
  push:
    branches: [ main, alpha, beta, dev, 'claude/**' ]
  pull_request:
    branches: [ main, alpha, beta, dev ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Validate YAML files
      run: |
        find . -name "*.yml" -o -name "*.yaml" | grep -v ".git" | while read f; do
          python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" && echo "✓ $f" || (echo "❌ $f" && exit 1)
        done

    - name: ShellCheck all shell scripts
      run: |
        SCRIPTS="install.sh update.sh entrypoint.sh config/setuproutes.sh"
        if command -v shellcheck &>/dev/null; then
          for f in $SCRIPTS; do
            [ -f "$f" ] && shellcheck "$f" && echo "✓ $f shellcheck passed" || exit 1
          done
        else
          for f in $SCRIPTS; do
            [ -f "$f" ] && bash -n "$f" && echo "✓ $f syntax OK (shellcheck not available)"
          done
        fi

    - name: Validate config/local.conf JSON
      run: |
        jq . config/local.conf > /dev/null \
          && echo "✓ config/local.conf valid JSON" \
          || (echo "❌ config/local.conf invalid JSON" && exit 1)

    - name: Check for hardcoded secrets
      run: |
        if grep -rE "(password|secret|token|api_key)\s*=\s*['\"][^'\"]+" \
            --include="*.yml" --include="*.yaml" --include="*.sh" .; then
          echo "❌ Possible hardcoded secrets found"
          exit 1
        fi
        echo "✓ No hardcoded secrets detected"
