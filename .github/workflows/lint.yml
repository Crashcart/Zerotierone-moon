name: Lint & Format

on:
  push:
    branches: [ main, test, 'claude/**' ]
  pull_request:
    branches: [ main, test ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Validate YAML files
      run: |
        find . -name "*.yml" -o -name "*.yaml" | grep -v ".git" | while read f; do
          python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" 2>&1 && echo "✓ $f" || (echo "❌ $f" && exit 1)
        done

    - name: Check for hardcoded secrets
      run: |
        if grep -rE "(password|secret|token|api_key)\s*=\s*['\"][^'\"]+" --include="*.yml" --include="*.yaml" --include="*.sh" .; then
          echo "❌ Possible hardcoded secrets found"
          exit 1
        fi
        echo "✓ No hardcoded secrets detected"
