name: Sync Branch References

on:
  push:
    branches: [main]
    paths:
      - 'README.md'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-refs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create sync branch
        run: |
          BRANCH="sync/branch-refs-$(date +%s)"
          git checkout -b $BRANCH
          echo "SYNC_BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Update test→main references
        run: |
          sed -i 's|/test/|/main/|g' README.md
          echo "✅ Update complete"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and PR if changes found
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: sync branch references to main"
          git push origin $SYNC_BRANCH
          gh pr create \
            --base main \
            --head $SYNC_BRANCH \
            --title "chore: sync branch references to main" \
            --body "Automated PR to update branch references in README.md" \
            --label "automated"
