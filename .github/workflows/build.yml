name: Docker Validate

on:
  push:
    branches: [ main, alpha, beta, dev, 'claude/**' ]
  pull_request:
    branches: [ main, alpha, beta, dev ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Validate docker-compose.yml
      run: |
        docker compose config > /dev/null 2>&1 || (echo "❌ Invalid docker-compose.yml" && exit 1)
        echo "✓ docker-compose.yml is valid"

    - name: Verify custom zerotier-moon image is referenced
      run: |
        grep -q "zerotier-moon" docker-compose.yml \
          && echo "✓ zerotier-moon image present" \
          || (echo "❌ Expected zerotier-moon image not found" && exit 1)

    - name: Verify required capabilities are present
      run: |
        grep -q "NET_ADMIN" docker-compose.yml && echo "✓ NET_ADMIN" || (echo "❌ NET_ADMIN missing" && exit 1)
        grep -q "NET_RAW"   docker-compose.yml && echo "✓ NET_RAW"   || (echo "❌ NET_RAW missing — required for iptables raw/NOTRACK" && exit 1)
        grep -q "SYS_ADMIN" docker-compose.yml && echo "✓ SYS_ADMIN" || (echo "❌ SYS_ADMIN missing" && exit 1)

    - name: Verify macvlan networks are configured
      run: |
        grep -q "macvlan-lan1" docker-compose.yml && echo "✓ macvlan-lan1" || (echo "❌ macvlan-lan1 missing" && exit 1)
        grep -q "macvlan-lan2" docker-compose.yml && echo "✓ macvlan-lan2" || (echo "❌ macvlan-lan2 missing" && exit 1)

    - name: Verify /dev/net/tun device is mounted
      run: |
        grep -q "/dev/net/tun" docker-compose.yml \
          && echo "✓ /dev/net/tun device present" \
          || (echo "❌ /dev/net/tun device missing" && exit 1)

    - name: Verify healthcheck is configured
      run: |
        grep -q "healthcheck" docker-compose.yml \
          && echo "✓ healthcheck present" \
          || (echo "❌ healthcheck missing" && exit 1)

    - name: Validate local.conf JSON
      run: |
        jq . config/local.conf > /dev/null \
          && echo "✓ config/local.conf valid JSON" \
          || (echo "❌ config/local.conf invalid JSON" && exit 1)

    - name: Validate iptables rules syntax
      run: |
        sudo iptables-restore --test < config/rules.v4 \
          && echo "✓ config/rules.v4 syntax OK" \
          || echo "⚠️ iptables-restore not available in CI — skipping syntax check"

    - name: Verify NOTRACK rules present
      run: |
        grep -q "NOTRACK" config/rules.v4 \
          && echo "✓ NOTRACK rule present" \
          || (echo "❌ NOTRACK missing from rules.v4 — ZeroTier UDP will hit conntrack" && exit 1)
