name: Tests

on:
  push:
    branches: [ main, alpha, test, 'claude/**' ]
  pull_request:
    branches: [ main, alpha, test ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check install.sh bash syntax
      run: |
        bash -n install.sh && echo "✓ install.sh syntax OK"

    - name: Validate docker-compose.yml
      run: |
        docker compose config > /dev/null 2>&1 && echo "✓ docker-compose.yml is valid" || echo "⚠️ docker-compose.yml may have issues (docker not fully available in CI)"

    - name: Validate README exists and contains install one-liner
      run: |
        [ -f "README.md" ] || { echo "❌ README.md missing"; exit 1; }
        grep -q "zt-install.sh" README.md && echo "✓ install one-liner present" || { echo "❌ install one-liner not found in README"; exit 1; }

    - name: Check governance files present
      run: |
        for f in ".github/copilot-instructions.md" ".github/REPO_CONFIG.md" ".github/TODO.md" ".github/PLANNING.md" ".github/BRANCH_AWARE_FILES.md"; do
          [ -f "$f" ] && echo "✓ $f" || { echo "❌ Missing: $f"; exit 1; }
        done

    - name: Check branch-aware URLs match PR target branch
      if: github.event_name == 'pull_request'
      run: |
        TARGET="${{ github.base_ref }}"

        # Map branch → expected installer filename
        case "$TARGET" in
          alpha) EXPECTED_INSTALLER="install-alpha.sh" ;;
          beta)  EXPECTED_INSTALLER="install-beta.sh"  ;;
          test)  EXPECTED_INSTALLER="install-test.sh"  ;;
          main)  EXPECTED_INSTALLER="install.sh"        ;;
          *)     echo "⚠️ Unknown target branch '$TARGET' — skipping branch-aware check"; exit 0 ;;
        esac

        ERRORS=0

        # Check every raw.githubusercontent.com URL in README.md points to correct branch + filename
        while IFS= read -r line; do
          if echo "$line" | grep -q "raw.githubusercontent.com/Crashcart/Zerotierone-moon/"; then
            if ! echo "$line" | grep -q "/$TARGET/$EXPECTED_INSTALLER"; then
              echo "❌ README.md URL should reference '$TARGET/$EXPECTED_INSTALLER': $line"
              ERRORS=$((ERRORS + 1))
            fi
          fi
        done < README.md

        # Check the branch installer's own header URL
        if [ -f "$EXPECTED_INSTALLER" ]; then
          if grep -q "raw.githubusercontent.com/Crashcart/Zerotierone-moon/" "$EXPECTED_INSTALLER"; then
            if ! grep "raw.githubusercontent.com/Crashcart/Zerotierone-moon/" "$EXPECTED_INSTALLER" | grep -q "/$TARGET/$EXPECTED_INSTALLER"; then
              echo "❌ $EXPECTED_INSTALLER header URL should reference '$TARGET/$EXPECTED_INSTALLER'"
              ERRORS=$((ERRORS + 1))
            fi
          fi
        else
          echo "❌ Expected installer '$EXPECTED_INSTALLER' not found in repo"
          ERRORS=$((ERRORS + 1))
        fi

        if [ "$ERRORS" -gt 0 ]; then
          echo "❌ Branch-aware URLs must match target branch '$TARGET' and installer '$EXPECTED_INSTALLER'"
          echo "   See .github/BRANCH_AWARE_FILES.md for the full manifest"
          exit 1
        fi
        echo "✓ All branch-aware URLs correctly reference '$TARGET/$EXPECTED_INSTALLER'"
