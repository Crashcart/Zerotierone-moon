name: Auto-merge claude/**→alpha on approval

on:
  pull_request:
    branches: [ alpha ]
    types: [ opened, reopened, synchronize, review_requested ]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'claude/')
    permissions:
      pull-requests: write
      contents: write
      issues: write

    steps:
    - uses: actions/checkout@v4

    - name: Check approval status
      uses: actions/github-script@v7
      id: approval
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const { data: reviews } = await github.rest.pulls.listReviews({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.payload.pull_request.number,
          });
          core.setOutput('has_approval', reviews.filter(r => r.state === 'APPROVED').length > 0);
          core.setOutput('has_changes', reviews.filter(r => r.state === 'CHANGES_REQUESTED').length > 0);

    - name: Get check runs status
      uses: actions/github-script@v7
      id: checks
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const { data: checkRuns } = await github.rest.checks.listForRef({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: context.payload.pull_request.head.sha,
          });
          const failed = checkRuns.check_runs.filter(c => c.conclusion === 'failure').length;
          const passed = checkRuns.check_runs.filter(c => c.conclusion === 'success').length;
          core.setOutput('all_passed', failed === 0 && passed > 0);

    - name: Auto-merge PR
      if: steps.approval.outputs.has_approval == 'true' && steps.approval.outputs.has_changes == 'false' && steps.checks.outputs.all_passed == 'true'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          try {
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'squash',
            });
            console.log('✅ PR merged successfully');
          } catch (error) {
            console.log('ℹ️ Auto-merge not available, may need manual merge');
          }

    - name: Post status comment
      if: always()
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const approval = '${{ steps.approval.outputs.has_approval }}';
          const checks   = '${{ steps.checks.outputs.all_passed }}';
          const message  = (approval === 'true' && checks === 'true')
            ? '✅ Auto-merge complete!'
            : '⏳ Waiting for approval and all checks to pass.';
          try {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: message,
            });
          } catch (e) { console.log('Could not post comment'); }
