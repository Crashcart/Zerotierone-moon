name: Auto-merge test→main on approval

on:
  pull_request:
    branches: [ main ]
    types: [ opened, reopened, synchronize, review_requested ]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.head_ref == 'test'
    permissions:
      pull-requests: write
      contents: write
      issues: write

    steps:
    - uses: actions/checkout@v3

    - name: Check approval status
      uses: actions/github-script@v6
      id: approval
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const pr = context.payload.pull_request;
          const { data: reviews } = await github.rest.pulls.listReviews({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: pr.number,
          });

          const approvals = reviews.filter(r => r.state === 'APPROVED').length;
          const changes = reviews.filter(r => r.state === 'CHANGES_REQUESTED').length;

          core.setOutput('has_approval', approvals > 0);
          core.setOutput('has_changes', changes > 0);

    - name: Get check runs status
      uses: actions/github-script@v6
      id: checks
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const pr = context.payload.pull_request;
          const { data: checkRuns } = await github.rest.checks.listForRef({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: pr.head.sha,
          });

          const passed = checkRuns.check_runs.filter(c => c.conclusion === 'success').length;
          const failed = checkRuns.check_runs.filter(c => c.conclusion === 'failure').length;

          core.setOutput('all_passed', failed === 0 && passed > 0);

    - name: Auto-merge PR
      if: steps.approval.outputs.has_approval == 'true' && steps.approval.outputs.has_changes == 'false' && steps.checks.outputs.all_passed == 'true'
      uses: actions/github-script@v6
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const pr = context.payload.pull_request;
          try {
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'squash',
            });
            console.log('✅ PR merged successfully');
          } catch (error) {
            console.log('ℹ️ Auto-merge not available, may need manual merge');
          }

    - name: Post comment
      if: always()
      uses: actions/github-script@v6
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const pr = context.payload.pull_request;
          const approval = '${{ steps.approval.outputs.has_approval }}';
          const checks = '${{ steps.checks.outputs.all_passed }}';

          const message = (approval === 'true' && checks === 'true')
            ? '✅ Auto-merge complete!'
            : '⏳ Waiting for approval and all checks to pass.';

          try {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: message,
            });
          } catch (error) {
            console.log('Could not post comment');
          }
